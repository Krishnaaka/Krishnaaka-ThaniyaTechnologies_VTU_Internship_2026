<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Simple User Management</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Simple User Management</h1>
    </header>
    <main class="container">
      <section class="panel form-panel">
        <h2 id="form-title">Add User</h2>
        <form id="user-form">
          <input type="hidden" id="user-id" />
          <label>
            Name
            <input type="text" id="name" required />
          </label>
          <label>
            Email
            <input type="email" id="email" required />
          </label>
          <label>
            Role
            <input type="text" id="role" />
          </label>
          <div class="actions">
            <button type="submit" id="save-btn">Save</button>
            <button type="button" id="cancel-btn" class="secondary">Cancel</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel">
        <div class="toolbar">
          <input id="search" placeholder="Search users..." />
          <button id="clear-storage" class="danger">Clear All</button>
        </div>
        <table id="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
